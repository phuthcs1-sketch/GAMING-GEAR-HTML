<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><title>Cửa hàng – GearNexus</title>
  <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/animations.css">
  <style>
    .shop-layout { display: grid; grid-template-columns: 250px 1fr; gap: 30px; margin-top: 30px; }
    .filter-section { background: var(--bg-secondary); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); height: fit-content; }
    .filter-group { margin-bottom: 25px; }
    .filter-group h4 { margin-bottom: 12px; color: var(--text-bright); }
    #category-filters { display: flex; flex-direction: column; gap: 8px; }
    input[type="text"], select { width: 100%; padding: 8px; background: var(--bg-primary); border: 1px solid var(--border-color); color: white; border-radius: 4px; }
  </style>
</head>
<body>
  <header id="main-header"></header>
  <main class="container shop-layout">
    <aside class="filter-section">
      <div class="filter-group">
        <h4>Tìm kiếm</h4>
        <input type="text" id="search-input" placeholder="Tên, hãng, tag...">
      </div>
      <div class="filter-group">
        <h4>Danh Mục</h4>
        <div id="category-filters"></div>
      </div>
      <div class="filter-group">
        <h4>Giá tối đa</h4>
        <input type="range" id="price-slider" min="0" step="50000" style="width:100%">
        <div id="price-slider-val" style="color: var(--color-accent); font-weight:bold; margin-top:5px;"></div>
      </div>
      <div class="filter-group">
        <h4>Sắp xếp</h4>
        <select id="sort-select">
          <option value="newest">Mới nhất</option>
          <option value="price-asc">Giá: Thấp đến Cao</option>
          <option value="price-desc">Giá: Cao đến Thấp</option>
          <option value="rating">Đánh giá tốt nhất</option>
          <option value="discount">Ưu đãi nhiều nhất</option>
        </select>
      </div>
    </aside>
    <section>
      <div id="product-grid" class="product-grid"></div>
    </section>
  </main>
  <footer id="main-footer"></footer>
  <script src="js/config.js"></script><script src="js/data.js"></script><script src="js/auth.js"></script><script src="js/cart.js"></script><script src="js/main.js"></script><script src="js/shop.js"></script>
</body>
</html>
