<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><title>Giỏ Hàng – GearNexus</title>
  <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/animations.css">
  <style>
    .cart-table { width: 100%; border-collapse: collapse; margin-top: 30px; background: var(--bg-secondary); border-radius: 8px; overflow: hidden; }
    .cart-table th, .cart-table td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
    .cart-table th { background: #151a21; color: var(--text-bright); }
    .summary-box { background: var(--bg-secondary); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); margin-top: 30px; width: 350px; margin-left: auto; }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
  </style>
</head>
<body>
  <header id="main-header"></header>
  <main class="container">
    <h1 style="color: var(--text-bright);">🛒 Giỏ Hàng Của Bạn</h1>
    <div id="cart-content"></div>
  </main>
  <footer id="main-footer"></footer>
  <script src="js/config.js"></script><script src="js/data.js"></script><script src="js/auth.js"></script><script src="js/cart.js"></script><script src="js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      renderCartPage();
      document.addEventListener("cartUpdated", renderCartPage);
    });

    function renderCartPage() {
      const content = document.getElementById("cart-content");
      const cart = Cart.getCart();
      if(cart.length === 0) {
        content.innerHTML = `<div class="text-center" style="padding: 50px 0;"><p>Giỏ hàng trống rỗng.</p><br><a href="shop.html" class="btn btn-primary">Đi Mua Sắm Ngay</a></div>`;
        return;
      }
      
      let rows = cart.map(item => {
        const p = getProductById(item.id);
        if(!p) return '';
        return `
          <tr>
            <td><img src="${p.images[0]}" width="60" style="background:#151a21; border-radius:4px;"></td>
            <td><a href="product.html?id=${p.id}" style="color:white; text-decoration:none">${p.name}</a></td>
            <td>${formatPrice(p.price)}</td>
            <td>
              <input type="number" value="${item.qty}" min="1" max="${p.stock}" style="width:50px; padding:4px" onchange="Cart.updateQty(${p.id}, parseInt(this.value))">
            </td>
            <td>${formatPrice(p.price * item.qty)}</td>
            <td><button class="btn btn-sm btn-outline" style="color:var(--color-neon); border-color:var(--color-neon)" onclick="Cart.removeFromCart(${p.id})">Xóa</button></td>
          </tr>
        `;
      }).join('');

      const t = Cart.getTotals();

      content.innerHTML = `
        <table class="cart-table">
          <thead><tr><th>Ảnh</th><th>Sản phẩm</th><th>Giá</th><th>SL</th><th>Tổng</th><th>Hành động</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div class="summary-box">
          <div class="summary-row"><span>Tạm tính:</span><span>${formatPrice(t.subtotal)}</span></div>
          ${t.promo ? `<div class="summary-row" style="color:var(--color-accent)"><span>Giảm giá (${t.promo.code}):</span><span>-${formatPrice(t.discountAmount)}</span> <a href="#" onclick="Cart.removePromo()" style="color:var(--color-neon); text-decoration:none; margin-left:5px;">[X]</a></div>` : ''}
          <div class="summary-row"><span>Phí vận chuyển:</span><span>${t.shippingFee === 0 ? 'Miễn phí' : formatPrice(t.shippingFee)}</span></div>
          <hr style="border-color:var(--border-color); margin:10px 0;">
          <div class="summary-row" style="font-size:18px; font-weight:bold; color:white"><span>Thành tiền:</span><span>${formatPrice(t.total)}</span></div>
          <div style="margin-top:20px;">
            <input type="text" id="promo-input" placeholder="Nhập mã giảm giá..." style="width:70%; padding:8px;">
            <button class="btn btn-sm btn-outline" onclick="applyPromoCode()">Áp dụng</button>
          </div>
          <button class="btn btn-primary btn-block" style="margin-top:20px;" onclick="Main.showToast('Đặt hàng thành công! (Mock Checkout)')">TIẾN HÀNH THANH TOÁN</button>
        </div>
      `;
    }

    function applyPromoCode() {
      const code = document.getElementById("promo-input").value;
      const res = Cart.applyPromo(code);
      Main.showToast(res.msg, res.success ? "success" : "error");
    }
  </script>
</body>
</html>
