<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><title>Chi Tiết Sản Phẩm</title>
  <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/animations.css">
  <style>
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; margin-top: 40px; }
    .img-main { background: #151a21; text-align: center; border-radius: 8px; border: 1px solid var(--border-color); }
    .img-main img { max-width: 100%; max-height: 450px; object-fit: contain; }
    .qty-control { display: flex; align-items: center; gap: 10px; margin: 20px 0; }
    .qty-control input { width: 60px; text-align: center; padding: 5px; background: var(--bg-secondary); color: white; border: 1px solid var(--border-color); }
  </style>
</head>
<body>
  <header id="main-header"></header>
  <main class="container" id="product-detail-container">
    <div class="detail-grid">
      <div class="img-main"><img id="product-main-img" src="" alt=""></div>
      <div>
        <span id="product-category" style="color: var(--color-accent); font-weight: bold; text-transform: uppercase;"></span>
        <h1 id="product-title" style="color: var(--text-bright); margin: 10px 0 20px;"></h1>
        <div id="product-stars" style="color: #ffb703; margin-bottom: 20px;"></div>
        <div style="margin-bottom: 20px;">Tình trạng: <span id="product-condition"></span></div>
        <div style="font-size: 28px; font-weight: bold; color: var(--color-accent);" id="product-price"></div>
        <div style="text-decoration: line-through; color: #666; margin-bottom: 20px;" id="product-old-price"></div>
        <p id="product-desc" style="margin-bottom: 30px;"></p>
        <div>Kho còn lại: <span id="product-stock" style="font-weight: bold;"></span></div>
        <div class="qty-control">
          <button class="btn btn-outline btn-sm" id="btn-decrease-qty">-</button>
          <input type="number" id="product-qty" readonly>
          <button class="btn btn-outline btn-sm" id="btn-increase-qty">+</button>
        </div>
        <button id="btn-add-to-cart-detail" class="btn btn-primary">Thêm Vào Giỏ Hàng 🛒</button>
      </div>
    </div>
    <h2 style="margin: 60px 0 20px; color: var(--text-bright)">Sản phẩm liên quan</h2>
    <div id="related-products-grid" class="product-grid"></div>
  </main>
  <footer id="main-footer"></footer>
  <script src="js/config.js"></script><script src="js/data.js"></script><script src="js/auth.js"></script><script src="js/cart.js"></script><script src="js/main.js"></script><script src="js/product.js"></script>
</body>
</html>
