<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><title>GearNexus – Ultimate Gaming Gear</title>
  <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <header id="main-header"></header>
  
  <section class="hero text-center container" style="padding: 60px 0; background: radial-gradient(circle, #1f2833 0%, #0b0c10 100%); border-radius: 12px; margin-top: 20px;">
    <h1 style="font-size: 48px; color: var(--text-bright); margin-bottom: 20px;">VŨ KHÍ TỐI THƯỢNG CHO GAME THỦ</h1>
    <p style="font-size: 18px; margin-bottom: 30px;">Sở hữu những thiết bị đỉnh cao dẫn đầu mọi trận chiến.</p>
    <a href="shop.html" class="btn btn-primary">Khám Phá Cửa Hàng ⚡</a>
  </section>

  <main class="container">
    <h2 style="margin: 40px 0 20px; color: var(--text-bright);">🔥 Sản phẩm nổi bật</h2>
    <div id="featured-products" class="product-grid"></div>
  </main>

  <footer id="main-footer"></footer>
  <script src="js/config.js"></script><script src="js/data.js"></script><script src="js/auth.js"></script><script src="js/cart.js"></script><script src="js/main.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const featGrid = document.getElementById("featured-products");
      if(featGrid) featGrid.innerHTML = getFeaturedProducts().map(p => Main.createProductCard(p)).join('');
    });
  </script>
</body>
</html>
