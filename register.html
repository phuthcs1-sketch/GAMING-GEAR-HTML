<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><title>Đăng Ký – GearNexus</title>
  <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/components.css">
  <style>
    .auth-box { background: var(--bg-secondary); padding: 30px; border-radius: 8px; width: 400px; margin: 80px auto; border: 1px solid var(--border-color); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 5px; color: var(--text-bright); }
    .form-group input { width: 100%; padding: 10px; background: var(--bg-primary); border: 1px solid var(--border-color); color: white; border-radius: 4px; }
  </style>
</head>
<body>
  <header id="main-header"></header>
  <main class="container">
    <div class="auth-box">
      <h2 style="color:var(--text-bright); margin-bottom:20px;" class="text-center">ĐĂNG KÝ THÀNH VIÊN</h2>
      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Tên hiển thị</label>
          <input type="text" id="reg-name" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" required>
        </div>
        <div class="form-group">
          <label>Mật khẩu (Tối thiểu 6 ký tự)</label>
          <input type="password" id="reg-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Đăng Ký</button>
      </form>
      <p style="margin-top:20px;" class="text-center">Đã có tài khoản? <a href="login.html" style="color:var(--color-accent)">Đăng nhập</a></p>
    </div>
  </main>
  <footer id="main-footer"></footer>
  <script src="js/config.js"></script><script src="js/data.js"></script><script src="js/auth.js"></script><script src="js/cart.js"></script><script src="js/main.js"></script>
  <script>
    function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById("reg-name").value;
      const email = document.getElementById("reg-email").value;
      const pass = document.getElementById("reg-password").value;
      const res = Auth.register(name, email, pass);
      
      if(res.success) {
        alert(res.msg); // Chuyển sang form đăng nhập sau khi ok
        window.location.href = "login.html";
      } else {
        Main.showToast(res.msg, "error");
      }
    }
  </script>
</body>
</html>
